name: Daily Stock AI Run

on:
  schedule:
    - cron: '0 7 * * *'  # UTC 07:00 = 한국 시간(KST) 매일 오후 16:00
  workflow_dispatch:     # 내가 원할 때 수동으로 버튼을 눌러서 실행할 수 있게 해주는 기능

jobs:
  build:
    runs-on: ubuntu-latest # 깃허브가 제공하는 무료 고성능 리눅스 서버 (RAM 7GB)

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 3.10 세팅하기
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필수 패키지 설치하기
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: AI 예측 봇 실행 및 서버로 전송!
        run: python main.py
