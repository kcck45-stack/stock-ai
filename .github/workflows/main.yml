name: Stock AI Prediction Bot

on:
  schedule:
    # 매일 한국 시간 오후 4시 20분 실행 (UTC 07:20)
    - cron: '20 7 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run AI Model
      env:
        MY_SERVER_IP: ${{ secrets.MY_SERVER_IP }} # 깃허브 금고에서 IP 꺼내오기!
      run: python main.py
